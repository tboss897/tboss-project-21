name: CD

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        project_id: ${{ secrets.GCP_PROJECT_ID }}
    
    - name: Configure Docker
      run: gcloud auth configure-docker
    
    - name: Build and push backend image
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/smartschool-backend:latest ./backend
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/smartschool-backend:latest
    
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy smartschool-backend \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/smartschool-backend:latest \
          --platform managed \
          --region ${{ secrets.GCP_REGION }} \
          --allow-unauthenticated \
          --set-env-vars DB_HOST=${{ secrets.DB_HOST }},DB_NAME=${{ secrets.DB_NAME }},DB_USER=${{ secrets.DB_USER }},DB_PASSWORD=${{ secrets.DB_PASSWORD }},REDIS_HOST=${{ secrets.REDIS_HOST }},REDIS_PORT=${{ secrets.REDIS_PORT }},SECRET_KEY=${{ secrets.SECRET_KEY }},DEBUG=False

  deploy-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        project_id: ${{ secrets.GCP_PROJECT_ID }}
    
    - name: Configure Docker
      run: gcloud auth configure-docker
    
    - name: Build and push frontend image
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/smartschool-frontend:latest ./frontend
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/smartschool-frontend:latest
    
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy smartschool-frontend \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/smartschool-frontend:latest \
          --platform managed \
          --region ${{ secrets.GCP_REGION }} \
          --allow-unauthenticated
